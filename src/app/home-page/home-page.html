<div class="flex items-center pt-8 px-8">
  <ntz-header header="Your Notes" />
  <button ntzButton (click)="createNote()" class="ml-auto">+ Create Note</button>
</div>

<div class="mx-8 grid grid-cols-3 gap-6 mt-8">
  @for (note of notesByDate(); track note.id; let first = $first) {
    <a [routerLink]="[note.id]" [class]="first ? 'col-span-2' : 'col-span-1'">
      <ntz-note-card [narrow]="!first" [note]="note" />
    </a>
  }
</div>
