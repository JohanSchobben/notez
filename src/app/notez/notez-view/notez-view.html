@let note = note$ | async;
@let widgets = widgets$ | async;

@if (note) {
  <div class="fixed top-0 left-0 p-4 z-10">
    <h1 class="text-4xl font-bold">{{note.title}}</h1>
    <button class="mt-4 bg-red-400 py-2 px-4" (click)="addWidget()">Add</button>
  </div>
}

<div class="w-full h-full relative">

  @if (widgets) {
    @for (widget of widgets; track widget.id) {
      <ntz-base-widget [widget]="widget">
        <div class="size-40  bg-white grid place-items-center border border-gray-600">
          <pre>
            <code>{{widget | json }}</code>
          </pre>
        </div>
      </ntz-base-widget>
    }
  }


</div>
